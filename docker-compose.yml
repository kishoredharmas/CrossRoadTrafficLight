version: '3.8'

services:
  traffic-sim:
    build: .
    ports:
      - "3001:3001"
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - WS_PORT=8080
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  # Optional: Add Redis for session management in production
  # redis:
  #   image: redis:7-alpine
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis-data:/data

volumes:
  redis-data:
